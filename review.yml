  - date: '2026-06-03'
    rating: 2
    summary: >-
      No public, self-service developer portal exists for UOW. Confirmed
      machine-readable surfaces are third-party platforms: a Research Online
      OAI-PMH endpoint (bepress Digital Commons, documented by Sherpa repo 276)
      and the UOW Library on Ex Libris Alma/Primo (REST APIs via the Ex Libris
      Developer Network, key-gated). The official website, the uowits GitHub
      org, and the LinkedIn school page were verified live. The OAI-PMH endpoint
      returned a bot challenge (HTTP 202 / empty body) so a valid Identify
      response could not be confirmed. No endpoints were fabricated.
