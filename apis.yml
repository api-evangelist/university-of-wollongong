apis:
  - aid: university-of-wollongong:research-online-oai
    name: Research Online OAI-PMH
    description: >-
      OAI-PMH metadata harvesting interface for University of Wollongong
      Research Online, the institution's open access repository running on
      bepress Digital Commons. Exposes journal articles, conference papers,
      theses, and reports for harvesting. Endpoint is documented by Sherpa
      (repository 276); the live endpoint returns a bot challenge to automated
      clients, so a valid Identify response could not be confirmed in this pass.
    humanURL: https://ro.uow.edu.au/
    baseURL: https://ro.uow.edu.au/do/oai/
