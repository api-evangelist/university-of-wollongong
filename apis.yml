        url: https://v2.sherpa.ac.uk/id/repository/276
  - aid: university-of-wollongong:library-primo-alma
    name: UOW Library Discovery (Ex Libris Primo/Alma)
    description: >-
      The UOW Library runs on the Ex Libris Alma library services platform with
      the Primo discovery layer (adopted 2020). Primo and Alma expose REST APIs
      for search, bibliographic, and resource-management workflows. The APIs are
      documented through the Ex Libris Developer Network and generally require an
      institution API key; UOW does not publish its own developer documentation.
    humanURL: https://uow.primo.exlibrisgroup.com/
    tags: [ Library, Discovery, Ex Libris, Primo, Alma, REST ]
    properties:
      - type: Documentation
