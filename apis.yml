aid: university-of-wollongong
name: University of Wollongong
description: >-
  The University of Wollongong (UOW) is a public research university based in
  Wollongong, New South Wales, Australia, ranked #167 in the QS World University
  Rankings 2025. UOW does not operate a public, self-service developer portal.
  Its confirmed machine-readable footprint is built on third-party platforms:
  the Research Online institutional repository runs on bepress Digital Commons
  and exposes an OAI-PMH metadata interface, while the UOW Library runs on the
  Ex Libris Alma/Primo platform whose REST APIs are documented through the Ex
  Libris Developer Network. UOW IT Services also maintains a small public GitHub
  organization. Most institutional systems (student administration, identity)
  are gated behind authentication and not publicly documented.
